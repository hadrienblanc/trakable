AllCops:
  NewCops: enable
  TargetRubyVersion: 3.1
  SuggestExtensions: false

Metrics/BlockLength:
  Exclude:
    - test/**/*
    - rakelib/**/*
    - "*.gemspec"

Metrics/ClassLength:
  Max: 200

Metrics/MethodLength:
  Max: 20

Layout/LineLength:
  Exclude:
    - "*.gemspec"

Style/Documentation:
  Exclude:
    - test/**/*
    - lib/trakable/version.rb
    - lib/generators/**/*
    - lib/trakable/railtie.rb

Style/ClassAndModuleChildren:
  Enabled: false

Gemspec/DevelopmentDependencies:
  Enabled: false

Gemspec/RequireMFA:
  Enabled: false
